`In Shakespeare's Macbeth, the title character's downfall is not entirely the result of the witches or Lady Macbeth. It is the result of choices he makes despite knowing they are wrong. The play makes this clear from the beginning. Macbeth's first soliloquy in Act 1 shows a man fully aware of the moral consequences of what he is considering. He lists reasons not to kill Duncan, his king is a guest, a good king, a man who trusts him. Then he admits his only reason for doing it is ambition. Shakespeare uses the aside and soliloquy throughout the play to give the audience access to Macbeth's reasoning, which means we cannot claim he doesn't understand what he's doing. This is what makes him a tragic figure rather than simply a villain. He has the capacity for conscience and chooses to override it. The dagger hallucination in Act 2 is often read as guilt manifesting before the act, which suggests that part of him already knows it is wrong before he does it. The play is essentially about the cost of suppressing your own moral judgement, and how that cost keeps increasing the further you go.`,

`The Crucible by Arthur Miller was written in 1953 but is set in 1692, and the gap between those two dates is the point. Miller was living through the McCarthy era when people were accused of communist sympathies without evidence and careers and lives were destroyed. Salem's witch trials gave him a historical framework to examine the same dynamic: fear, accusation, the pressure to confess and name names. Abigail Williams is not simply a villain. She is a teenager who has been exploited by a man with power and is now using the only power available to her, which is accusation, to survive. The play asks you to understand how systems of fear corrupt everyone inside them. Even John Proctor, who is positioned as the moral centre of the play, is a flawed man whose pride ultimately costs him his life. His refusal to sign the confession is about his name, his reputation, which is partly admirable and partly ego. Miller doesn't give the audience a clean hero because the situation doesn't allow for one. The most frightening thing in The Crucible is not Abigail but the court, the institution that makes her accusations possible.`,

`George Orwell's 1984 is a novel about power, specifically about how power sustains itself through the control of language and memory. The Party's slogan "War is Peace, Freedom is Slavery, Ignorance is Strength" works not by making logical sense but by demonstrating that logic can be overridden. If the Party says something is true, it becomes true, because the Party controls the evidence, the records and the people. Winston's job literally involves rewriting history to match the Party's current position, which means the past is unstable. Orwell coined the term doublethink to describe the ability to hold two contradictory beliefs simultaneously and accept both. This isn't stupidity, it's a survival mechanism in a totalitarian system. What makes the novel still relevant is that it identifies something real about the way authoritarian systems operate: they don't just oppress people physically, they try to make independent thought impossible. Julia represents a different kind of resistance, personal, sensory, body-based rather than intellectual, and Orwell complicates the novel by suggesting her approach might be more realistic, if less noble.`,

`Jasper Jones by Craig Silvey is set in Corrigan, Western Australia in 1965, and the isolation of that setting is essential to how the novel works. Charlie Bucktin is a bookish thirteen-year-old who is suddenly pulled into a situation far beyond his experience when Jasper Jones, the town outcast, comes to his window one night. The novel uses the hot, close, small-town environment to show how prejudice operates when there is nowhere to go and no one to appeal to. Jasper, who is of mixed Aboriginal heritage, is automatically suspected of anything that goes wrong in Corrigan, and the novel shows this not through dramatic confrontation but through the constant low-level assumption of his guilt. Charlie's education across the summer is about learning to see this clearly. The cricket metaphor that runs through the novel is used to connect Charlie's understanding of the game with his understanding of fairness and the gap between how things are supposed to work and how they actually do. Silvey is doing something careful with the coming-of-age structure because the thing Charlie is coming of age into is the knowledge that the adult world is not just and the structures meant to protect people often protect the wrong people.`,

`The Handmaid's Tale by Margaret Atwood is frequently described as a warning, but Atwood herself has said she was careful to include nothing in the novel that had not already happened somewhere in the world. Gilead is constructed from real historical examples of theocracy, totalitarianism and the specific targeting of women's bodies as political terrain. Offred's narration is unreliable in particular ways. She tells the reader at the end that she has constructed her account partly from memory and partly from imagination. This is not a flaw in the novel. It's Atwood's point that testimony from within an oppressive system is always compromised, always partial, always filtered through survival. The Aunts are among the most disturbing figures in the novel because they are women who enforce the system against other women, which Atwood uses to show how oppression recruits its victims to maintain itself. The red robes and white wings of the handmaids function as a visual symbol of how ideology is embedded in the body through dress. The reader's discomfort at the domestic details, the shopping, the walks, the rituals, is deliberate. Atwood wants the horror to feel ordinary.`,

`In Markus Zusak's The Book Thief, Death narrates the story of Liesel Meminger in Nazi Germany. The choice of Death as narrator is unusual and specific. Death is not cruel in this novel, it is tired. It collects souls and observes human behaviour with something like weary compassion, frequently noting that it is haunted by humans, which inverts the usual relationship. The effect is that the violence and loss of the war is filtered through a perspective that has seen all of it and is still not indifferent, which prevents the novel from becoming numb. Liesel's relationship with words is central. She steals books. She reads in the bomb shelter while people are terrified. She writes her own story. Zusak uses this to argue that language is the thing that allows humans to preserve meaning even in conditions designed to destroy it. The relationship between Liesel and Hans Hubermann is the emotional centre of the novel. Hans is not a hero in a public sense. He is kind, consistent, and present, and the novel suggests that this kind of quiet courage is the most important kind. The ending is devastating but not hopeless because Liesel survives and carries the story, which is the point.`,

`Peter Weir's film Dead Poets Society is about education, specifically about the tension between institutions that demand conformity and individuals who want to think for themselves. John Keating, played by Robin Williams, is a teacher who asks his students to question what they've been taught about literature, life, and their own futures. The school itself, Welton Academy, is shown as a place of tradition and pressure. Its four pillars are tradition, honour, discipline, excellence, and the film presents these not as values but as instruments of control. Todd Anderson's arc is the most significant in the film. He begins as a boy too afraid to speak and ends standing on his desk saying O Captain, My Captain, which is a small act but an enormous one given who he was at the beginning. Neil Perry's death is the tragedy the film turns on. Keating is blamed for it by the institution, which is both unfair and understandable from the school's perspective, because he did encourage the boys to seize the day, and Neil did. What the film argues is that the institution's way of managing this, expelling Keating and scapegoating free thought, is exactly the problem it has been diagnosing all along.`,

`Baz Luhrmann's Romeo + Juliet, released in 1996, transposes Shakespeare's play to a contemporary American city while keeping the original text. This creates a specific kind of friction that is the point of the adaptation. Characters speak Elizabethan English while wearing suits and carrying guns branded Sword and Dagger. The Capulet and Montague families are corporate rivals. This juxtaposition asks the audience to think about whether the play's themes, family loyalty, youthful passion, the consequences of feuding, are specific to their historical moment or whether they are structural. Luhrmann's visual style is maximalist and deliberately operatic. He's not trying to make the story feel realistic. He's trying to make it feel how it feels, which is excessive and urgent and tragic. The casting of Leonardo DiCaprio and Claire Danes means the audience is encouraged to invest emotionally in two characters whose deaths they already know are coming. The film's use of television news footage and media tropes to frame the story is an early example of what would become a common technique, pointing to how modern media shapes narrative. Luhrmann argues, essentially, that this story is still happening.`,

`Tim Winton's Cloudstreet follows two working-class Western Australian families who share a house across twenty years. The novel is epic in scope and domestic in focus at the same time, which is unusual. Winton is interested in ordinary people doing ordinary things and trying to make a life, and he writes this without condescension. The Lambs and the Pickles are both flawed families with complicated histories and Winton refuses to simplify them. Fish Lamb's accident at the beginning, his near-drowning that leaves him changed, operates throughout the novel as a spiritual wound. Fish wants to return to something, he can't quite articulate what, and the ending of the novel resolves this in a way that is both literal and metaphorical. The house on Cloud Street is almost a character in itself, with its history of pain and resistance from the Aboriginal woman whose presence haunts it. Winton doesn't use this lightly. He's writing about what it means to occupy land with a troubled history and how that history doesn't disappear just because the new occupants don't know about it. The novel is about community, about luck, about what it means to survive and what it costs.`,

`Shakespeare's Othello is a play about jealousy, but more specifically it is about how jealousy is manufactured. Iago does not simply exploit Othello's existing insecurities. He constructs them, plants evidence, chooses timing, manages information. He is, in a sense, a kind of director of events. The soliloquies he shares with the audience make him almost a collaborator, talking the audience through his plan, which creates a troubling complicity. We know what he's doing and we watch it work. Othello is not presented as foolish. He is presented as a man in a position of genuine vulnerability: a Black man in a white Venetian society, recently married, somewhat outside the social codes of the world he's operating in. Iago targets these specific vulnerabilities. The handkerchief plot is extraordinary in its simplicity. A piece of cloth becomes evidence of infidelity because Iago controls how it is interpreted. The play is often studied in relation to race, and Othello's own internalisation of the racist assumptions of his society, his eventual belief that Desdemona's apparent betrayal fits some natural order, is part of what makes the tragedy so complete. He destroys the person who loves him most because he has learned to see himself through his enemy's eyes.`,

`In Christos Tsiolkas's The Slap, a single act of violence, an adult man hitting a child at a suburban barbecue, is examined from eight different perspectives. Each narrator has a different relationship to the event and a different investment in what it means. This structure is unusual in literary fiction because it resists a single moral position. The reader is asked to understand each narrator's worldview fully enough to see why they interpret the same event so differently. The slap itself becomes a lens through which Australian suburban culture is examined, its class tensions, its racial dynamics, its complicated relationships with family, discipline, and masculinity. Tsiolkas is not making a simple argument about whether the slap was right or wrong. He's examining the entire ecosystem of assumptions and relationships that made the moment possible and that shapes the aftermath. Some characters read the slap as an assault. Others read it as a legitimate response to an undisciplined child. The novel argues that both of these readings are real and that the society that produced them is one we need to examine carefully. The Slap generated controversy in Australia partly because it refused to let its readers feel comfortable.`,

`The film Gattaca imagines a future where genetic engineering has made a person's DNA the primary determinant of their opportunities. Vincent is genetically "in-valid" in a society that uses that term officially, and he assumes the identity of Jerome, a genetically valid man, to pursue his dream of space travel. The film uses this premise to ask whether determination and aspiration can override the structures designed to stop them. It is also a critique of meritocracy. Gattaca's society believes it has created the fairest possible system, one where ability is objectively measured, but the film shows that what is being measured was determined before birth, which is not merit at all. The cinematography is deliberately cool and clean, all glass and concrete and pale light, which visually communicates a world where efficiency has replaced warmth. Uma Thurman's character Irene has a slightly elevated heart-risk reading and it has shaped her entire life, kept her from things she wanted, in a system that claims to be rational. Vincent's success by the end of the film is not entirely triumphant because the system that excluded him is still operating. He got through because of deception, which the film acknowledges. The injustice remains.`,

`Miller's Death of a Salesman is a play about the American Dream and what it costs people who believe in it absolutely. Willy Loman is a salesman whose self-worth is entirely tied to commercial success and the belief that being well-liked is the same as being valuable. The play is structured around Willy's fragmenting memory, moving between present scenes and recalled past without clear signalling, which puts the audience inside his deteriorating perspective. Biff, his son, is a figure of particular importance because he is the person who can see Willy clearly and it destroys him to do so. The confrontation near the end of the play where Biff tries to make Willy understand the truth about both of them is one of the most powerful scenes in American theatre. Miller is critiquing something specific: the way a particular version of masculinity tied to financial achievement is passed down between generations and what happens when it meets reality. The play was written in 1949 and its critique of capitalist values and the myth of success still resonates because the belief system Willy holds has not disappeared. If anything it's louder.`,

`To Kill a Mockingbird by Harper Lee is narrated by Scout Finch, who is six at the beginning of the novel and nine by the end. Lee uses a child narrator for specific reasons. Scout doesn't understand the racial politics of Maycomb, Alabama, which means she observes them without the adult habit of normalising them. When she is confused about why Tom Robinson is obviously innocent but is still convicted, her confusion is the point. The reader shares it. Atticus Finch has been both celebrated and critiqued as a character. He is idealistic, principled, willing to defend a Black man in a town that will punish him for it. He is also a white man operating within the system, and his belief in the law as ultimately fair is something the novel complicates, because Tom Robinson dies, the law does not save him. Boo Radley's arc across the novel mirrors Tom Robinson's in interesting ways. Both are figures that the town either fears or projects onto. Scout's final understanding of Boo, that the stories told about him were wrong, is connected to her understanding of Tom. What she is learning across the novel is to see people clearly rather than through the stories others tell about them.`,

`Cloudstreet is Tim Winton's most celebrated novel but it is also one of the most distinctly Western Australian books in the Australian literary canon. Winton writes the suburban Perth of the mid-twentieth century with an intimacy that comes from belonging, but also with a critical eye. The river in the novel is a recurring image. Characters are defined by their relationship to water, whether they are comfortable near it, whether it heals or frightens them. Fish Lamb's near-drowning in the opening chapters establishes water as both threat and promise, something that takes and something that, in the novel's logic, might also restore. The magical realist elements in the novel, the pig that seems to prophesy, the presence that haunts the house, sit alongside scenes of grocery shopping and shift work and family argument. Winton doesn't mark the magical as different in tone from the ordinary, which suggests his point is that the spiritual and the everyday are not separate categories. This is a distinctly Australian kind of literary sensibility, influenced by the landscapes and Indigenous presence that European settler culture has not always known how to account for. Cloudstreet accounts for it imperfectly but honestly.`,

`The Truman Show, directed by Peter Weir in 1998, follows a man who has lived his entire life on a television set without knowing it. Every person in his life is an actor. Every event is scripted or managed. The film asks what it would mean to discover that your reality has been manufactured and that the people you love are performing that love for an audience. The character of Christof, the show's creator, is presented as genuinely believing he has given Truman something valuable, a safe, predictable, happy life. He is not simply a villain. He believes in the product. This is what makes him disturbing. Truman's growing awareness that something is wrong is shown through small disruptions, a light falling from the sky, a radio broadcast, his wife's strange moments of breaking character. He has been conditioned to explain these things away and he does, which is a comment on how well we can be trained to ignore evidence that contradicts our worldview. His final choice to walk through the door into the real world is triumphant but also frightening, because the film does not tell us what is on the other side. Weir is saying that reality, even an unknown one, is worth more than a comfortable fiction.`,

`Shakespeare's The Merchant of Venice is a play that has been staged in radically different ways across its history, sometimes as a comedy, sometimes as an examination of antisemitism, sometimes as both simultaneously. Shylock is the character the play cannot decide what to do with. He is given one of the most powerful speeches in Shakespeare's canon, the "Hath not a Jew eyes" speech, which argues for common humanity with genuine force. He is also shown as vengeful and rigid. The play does not resolve this tension cleanly. Shylock loses everything in the trial scene, his bond, his money, his daughter, and is forced to convert to Christianity, which Elizabethan audiences may have read as mercy and which contemporary audiences typically read as an act of profound cruelty. How you stage that scene determines what kind of play this is. The Merchant of Venice rewards careful study precisely because it is uncomfortable and contradictory. It is a play written in a specific moment of English history when Jewish people were officially expelled from England, and it carries that history in ways that cannot be separated from the text. To engage with it seriously means sitting with that discomfort rather than resolving it.`,

`In Liane Moriarty's Big Little Lies, three women in an affluent coastal town are implicated in a murder. The novel uses a suburban Australian setting to examine what happens when the surface of a life looks perfect and the interior is something else entirely. Moriarty writes in a satirical mode that allows her to be critical of her characters without dismissing them. The three central women, Madeline, Celeste and Jane, are all dealing with forms of harm and loss that the community around them is not designed to see or acknowledge. The novel's structure, which moves backwards from the fact of the murder, creates suspense around the revelation of who died and who was responsible, but the mystery is almost secondary to the emotional investigation. Celeste's storyline deals directly with domestic violence within a wealthy marriage, and Moriarty shows carefully how the economic and social dynamics of that situation make leaving feel impossible. The novel was adapted into a very successful television series, which extended some of these themes and arguably deepened Celeste's storyline. Big Little Lies is sometimes marketed as light reading, which undersells it. It is a carefully constructed novel about the gap between the life you present and the life you actually live.`,

`Khaled Hosseini's The Kite Runner is a novel about guilt and the possibility of redemption. Amir, a wealthy Afghan boy, witnesses an act of violence against his servant and friend Hassan and does not intervene. This failure shapes his entire adult life. The novel is structured as Amir's attempt to understand and then address what he did, or didn't do, as a child. Hosseini uses the political history of Afghanistan, the Soviet invasion, the Taliban's rise and fall, not as backdrop but as direct consequence for the characters. Amir's class privilege in Kabul is part of what made his failure possible, and Hosseini examines this without letting Amir fully off the hook. Sohrab's storyline in the final section of the novel has attracted some criticism for using a child's trauma as a vehicle for Amir's redemption arc, which is a reasonable critique. The novel is most powerful in its middle sections when it is honest about the complexity of Amir's guilt, the ways he rationalised it, the way it followed him. The kite imagery throughout the novel connects freedom, childhood, and the things we lose through cowardice. The ending's famous line, "I ran," is deliberately ambiguous about whether genuine change is possible or whether Amir is simply performing it.`

// ─── HIGHLIGHTER ──────────────────────────────────────────────────────────────
const NOUN_STARTS = new Set(["the","it","a","an","he","she","his","her","this","these","those","they","then","there"]);
const STOP_WORDS  = new Set(["and","but","so","then","just","really","very","quite","rather"]);
const BASIC_WORDS = new Set([
  "got","get","gets","getting","went","go","goes","going","ran","run",
  "saw","see","sees","seeing","looked","look","looks","looking",
  "show","shows","said","say","says","make","makes","made","making",
  "big","small","nice","good","bad","things","stuff","feel","feels","felt"
]);
const AUX_WORDS = new Set(["was","were","is","are","be","been","being","has","have","had"]);

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function highlightText(raw){
  if(!raw) return "";
  const sentences = raw.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [raw];
  let out = "";
  let lastKey = new Set();

  for(const sent of sentences){
    const s = sent.trim();
    if(!s) continue;
    const firstWordMatch = s.match(/^[A-Za-z']+/);
    const firstWord = firstWordMatch ? firstWordMatch[0] : "";
    const tokens = s.match(/[A-Za-z0-9']+|[^A-Za-z0-9' ]/g) || [];
    const currentKey = new Set();

    const rebuilt = tokens.map((tok, idx) => {
      const isWord = /^[A-Za-z0-9']+$/.test(tok);
      if(!isWord) return escapeHtml(tok);
      const low = tok.toLowerCase();
      const htmlTok = escapeHtml(tok);

      if(idx === 0 && firstWord && NOUN_STARTS.has(firstWord.toLowerCase()) && low === firstWord.toLowerCase())
        return `<span class="hl-noun">${htmlTok}</span>`;
      if(STOP_WORDS.has(low)) return `<span class="hl-stop">${htmlTok}</span>`;
      if(BASIC_WORDS.has(low)) return `<span class="hl-basic">${htmlTok}</span>`;
      if(AUX_WORDS.has(low)) return `<span class="hl-passive">${htmlTok}</span>`;
      if(low.length >= 6 && !STOP_WORDS.has(low) && !AUX_WORDS.has(low)){
        currentKey.add(low);
        if(lastKey.has(low)) return `<span class="hl-repeat">${htmlTok}</span>`;
      }
      return htmlTok;
    }).join(" ").replace(/ +([,.!?;:])/g,"$1");

    lastKey = currentKey;
    out += rebuilt + " ";
  }
  return out.trim();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function getPool(level, mode){
  if(mode === 'Narrative') return data.Narrative[level];
  return data.Analytical[level];
}

function render(){
  const jrPool = getPool('Junior', modes.Junior);
  const srPool = getPool('Senior', modes.Senior);
  const i = index % Math.min(jrPool.length, srPool.length);

  document.getElementById('jrContent').innerHTML = highlightText(jrPool[i]);
  document.getElementById('srContent').innerHTML = highlightText(srPool[i]);

  const total = Math.min(jrPool.length, srPool.length);
  document.getElementById('stats').textContent = `Example ${i + 1} of ${total}`;
}

function setMode(level, mode){
  modes[level] = mode;
  // Update button states for that level
  document.querySelectorAll(`[data-level="${level}"]`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.level, btn.dataset.mode));
});

// Set initial active states
setMode('Junior', 'Narrative');
setMode('Senior', 'Narrative');

const poolSize = () => Math.min(getPool('Junior', modes.Junior).length, getPool('Senior', modes.Senior).length);
document.getElementById('btnNext').onclick   = () => { index = (index + 1) % poolSize(); render(); };
document.getElementById('btnPrev').onclick   = () => { index = (index - 1 + poolSize()) % poolSize(); render(); };
document.getElementById('btnRandom').onclick = () => { index = Math.floor(Math.random() * poolSize()); render(); };
document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
