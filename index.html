<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expression Sharpener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['DM Sans', 'sans-serif'], serif: ['DM Serif Display', 'serif'] } } }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; transition: background-color 0.3s; }
    h1 { font-family: 'DM Serif Display', serif; }

    .hl-noun    { background:#dbeafe; color:#1e40af; border-bottom:2px solid #3b82f6; font-weight:700; padding:0 3px; border-radius:3px; }
    .hl-passive { background:#fee2e2; color:#991b1b; border-bottom:2px solid #ef4444; font-weight:700; padding:0 3px; border-radius:3px; }
    .hl-basic   { background:#dcfce7; color:#15803d; border-bottom:2px solid #22c55e; font-weight:700; padding:0 3px; border-radius:3px; }
    .hl-repeat  { background:#f3e8ff; color:#6b21a8; border-bottom:2px solid #a855f7; font-weight:700; padding:0 3px; border-radius:3px; }
    .hl-stop    { background:#fef9c3; color:#854d0e; border-bottom:2px solid #eab308; font-weight:700; padding:0 3px; border-radius:3px; }

    .dark .hl-noun    { background:rgba(30,58,138,0.85);  color:#bfdbfe; border-color:#60a5fa; }
    .dark .hl-passive { background:rgba(127,29,29,0.85);  color:#fecaca; border-color:#f87171; }
    .dark .hl-basic   { background:rgba(6,78,59,0.85);    color:#bbf7d0; border-color:#4ade80; }
    .dark .hl-repeat  { background:rgba(88,28,135,0.85);  color:#e9d5ff; border-color:#c084fc; }
    .dark .hl-stop    { background:rgba(113,63,18,0.85);  color:#fef08a; border-color:#facc15; }

    .mode-btn { transition: all 0.15s; }
    .mode-btn.active { background:#2563eb; color:#fff; }
    .dark .mode-btn.active { background:#3b82f6; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen">

<div class="flex flex-col md:flex-row min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-full md:w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-6 flex flex-col gap-6">
    <div>
      <h1 class="text-3xl text-blue-600 dark:text-blue-400">Sharpener</h1>
      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Writing Exemplars</p>
    </div>

    <!-- Navigation -->
    <div class="space-y-2 pt-2 border-t border-slate-200 dark:border-slate-700">
      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Navigate</p>
      <div class="flex gap-2">
        <button id="btnPrev" class="flex-1 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 py-2.5 rounded-xl font-semibold text-sm transition">← Prev</button>
        <button id="btnNext" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-semibold text-sm transition">Next →</button>
      </div>
      <button id="btnRandom" class="w-full bg-violet-600 hover:bg-violet-700 text-white py-2.5 rounded-xl font-semibold text-sm transition">Random</button>
      <p id="stats" class="text-xs text-slate-400 text-center pt-1"></p>
    </div>

    <!-- Legend -->
    <div class="border-t border-slate-200 dark:border-slate-800 pt-4">
      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Highlight Key</p>
      <div class="space-y-2 text-xs font-semibold">
        <div class="flex items-center gap-2.5 text-slate-600 dark:text-slate-400"><div class="w-3.5 h-3.5 rounded bg-blue-500"></div>Weak sentence start</div>
        <div class="flex items-center gap-2.5 text-slate-600 dark:text-slate-400"><div class="w-3.5 h-3.5 rounded bg-red-500"></div>Passive / auxiliary verb</div>
        <div class="flex items-center gap-2.5 text-slate-600 dark:text-slate-400"><div class="w-3.5 h-3.5 rounded bg-green-500"></div>Basic / vague word</div>
        <div class="flex items-center gap-2.5 text-slate-600 dark:text-slate-400"><div class="w-3.5 h-3.5 rounded bg-purple-500"></div>Repeated word</div>
        <div class="flex items-center gap-2.5 text-slate-600 dark:text-slate-400"><div class="w-3.5 h-3.5 rounded bg-yellow-400"></div>Filler / stop word</div>
      </div>
    </div>

    <button id="themeToggle" class="mt-auto py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-xl font-semibold text-sm transition">
      Toggle Theme
    </button>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 p-6 md:p-10 space-y-8">

    <!-- Year 5 panel -->
    <section class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
        <h2 class="font-bold text-blue-500 text-lg">Year 5</h2>
        <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-lg gap-1">
          <button data-level="Junior" data-mode="Narrative" class="mode-btn px-3 py-1.5 text-xs font-bold rounded-md text-slate-500">Narrative</button>
          <button data-level="Junior" data-mode="Analytical" class="mode-btn px-3 py-1.5 text-xs font-bold rounded-md text-slate-500">Analytical</button>
        </div>
      </div>
      <div id="jrContent" class="px-6 py-6 text-lg md:text-xl leading-relaxed"></div>
    </section>

    <!-- Year 10 panel -->
    <section class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
        <h2 class="font-bold text-violet-500 text-lg">Year 10</h2>
        <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-lg gap-1">
          <button data-level="Senior" data-mode="Narrative" class="mode-btn px-3 py-1.5 text-xs font-bold rounded-md text-slate-500">Narrative</button>
          <button data-level="Senior" data-mode="Analytical" class="mode-btn px-3 py-1.5 text-xs font-bold rounded-md text-slate-500">Analytical</button>
        </div>
      </div>
      <div id="srContent" class="px-6 py-6 text-lg md:text-xl leading-relaxed"></div>
    </section>

  </main>
</div>

<script>
// ─── MODE STATE ───────────────────────────────────────────────────────────────
let modes = { Junior: 'Narrative', Senior: 'Narrative' };
let index = 0;

// ─── EXEMPLARS ────────────────────────────────────────────────────────────────

const data = {
  Narrative: {
    Junior: [
`It was the worst day of the year and I hadn't even gotten to school yet. The bus went past our stop without stopping and Mum was already at work so I had to walk. By the time I got there my bag was soaking and Mr Hendricks gave me a late slip even though I explained what happened. He didn't really listen, he just kept writing. I sat down at my desk and Callie looked at me like I smelled bad or something. I didn't even do anything to her. The maths sheet was already half done by everyone else so I just guessed the ones I missed and tried to look normal. At lunch I went to the library because the oval was loud and I didn't feel like talking to anyone. It was okay in there. Quieter.`,

`There was a new kid in our class on Monday and nobody really talked to him at first. His name was Darius and he had this really cool pencil case with a dragon on it. I wanted to say something about it but I didn't know how without sounding weird. At lunch he sat at the end of our table and just ate his sandwich without looking up. Jordan tried to be funny and said something about his shoes which wasn't even that mean but Darius went really quiet after that. I felt bad but I didn't say anything and I kind of wish I had. After school I saw him at the crossing and I said I liked his pencil case and he said thanks and that was it but it felt like enough.`,

`Our group project on volcanoes was due Thursday and we hadn't even started the poster yet. It was meant to be a group thing but basically I did everything. Priya kept saying she'd do the writing and then she just didn't. Jake cut out one photo and called it done. On Wednesday night I stayed up until like 9:30 finishing the labels and my mum had to help me stick the title on straight. The next day Mrs Clarkson held it up in front of the whole class and said it was excellent and everyone looked at me and smiled. Priya said "we worked really hard on it" and I nearly said something but I didn't. I just smiled too. It was a weird feeling, sort of good and sort of not.`,

`The swimming carnival was the thing I was most dreading all year. I am not a bad swimmer but I'm not fast either and in my race there were kids from the squads who train every morning before school. When my name was called I walked to the blocks and my legs felt heavy. The starter gun went and I dived in wrong and swallowed water straight away. I came last by ages. When I climbed out everyone was already cheering for the next race and nobody was really watching anymore which was actually a relief. Dad was in the stands and he waved and gave me a thumbs up even though he obviously saw. On the way home he bought us Maccas and didn't mention the race once.`,

`We were doing a class debate about whether school uniforms should be banned and I got put on the side that said yes, uniforms should stay. The problem was I actually agree with that so I thought it would be easy. It was not easy. When it was my turn I forgot my whole second point and just repeated the first one. I could feel my face going red. The other team had this girl Amelia who spoke really clearly without any notes and I kept looking at my cards. Our team lost by the judge's decision which was Ms Farrant and she said the other side had better evidence. After class Amelia said I made good points which was nice but I think she was just being polite.`,

`Every Friday we have free reading and I always bring my own book from home because the class library is mostly stuff for little kids. But last Friday I forgot mine and had to pick something off the shelf. There was this old one with a cracked spine called Island of the Blue Dolphins and I'd never heard of it. I read the first chapter just sitting on the mat with everyone else and by the time Ms Rennie said pack up I was actually annoyed because I wasn't finished. I borrowed it and read it all weekend. I don't know why I'd never heard of it before. On Monday I put it back and someone else had already taken it which felt a bit like finding something and then losing it again.`,

`The excursion to the botanical gardens was supposed to be educational but mostly it was just hot. We had to fill in a worksheet about native plants and the answers were on the little signs next to each one, so it wasn't really hard, just long. Hamish kept messing around near the pond and a teacher had to tell him to move back three separate times. At the end we had lunch in the shade and my sandwich was squashed flat from the bus ride. It tasted fine though. On the bus back I fell asleep against the window and woke up with my face sweaty against the glass which was embarrassing even though probably nobody saw. I'd go again though. The jacaranda section was actually really pretty.`,

`There was a dog that kept sitting outside the school gate every afternoon. It wasn't anyone's dog, or if it was, the owner never came. It was a medium-sized brown dog with one ear that stuck up and one that flopped. Some kids tried to pat it and it let them but didn't wag its tail much. I started saving the last bit of my sandwich for it. Mum said I shouldn't feed strays because then they keep coming back, which I thought was the point. On the Thursday of the third week it wasn't there. I looked up and down the street but nothing. The next day it wasn't there either and I still had the sandwich piece in my bag. I threw it in the bin on the way home. I kept thinking about it for the rest of the week.`,

`It was market day at school and our class was selling bookmarks we'd made in art. Mine were okay but Lily's were amazing, she'd done these tiny detailed drawings on each one and kids from other classes were buying them first. I was a bit jealous but it was also hard to be jealous because she's my friend and her drawings were actually that good. I sold four bookmarks which Mrs Singh said was a great effort. At the end we got to keep the money we made which was $6 for me. I bought a sausage sizzle and a juice and had fifty cents left. The sausage was slightly burnt on one side but that's actually the better side so it was fine.`,

`The school play auditions were on a Tuesday and I signed up even though I was properly scared. I had practiced my monologue at home in the bathroom with the fan on so nobody could hear me. When my turn came I stood in front of Ms Okafor and the two other teachers and my voice came out weirdly high at the start. I got through the whole thing though and only forgot one line, which I covered by pausing like it was on purpose. The cast list went up Thursday and I got a part. Not the main one, but a real one with two actual scenes. Mum took a photo of the list on the noticeboard and sent it to Grandma.`,

`The library book I returned was three weeks overdue and I owed $1.50 which doesn't sound like much but I didn't have any money on me. The librarian, Mr Osei, said he'd put it on my record and I could bring it tomorrow. I kept forgetting and he kept reminding me with this look that wasn't mean but was very patient in a way that somehow felt worse than being told off. I finally paid it on a Friday with coins I found in my school bag and an old twenty-cent piece from my dad's jar at home which Mr Osei said he couldn't accept, so I owed twenty cents still. I brought that the next Monday and he said thank you and stamped my card and that was the end of it.`,

`We had to write a personal narrative for homework and it was supposed to be about a time we felt proud. I sat at the table for ages and couldn't think of anything. Mum said "what about the cross country?" and I said that didn't count because I didn't win, just finished. She said finishing was the point but that's what parents say. Eventually I wrote about the time I learned to ride my bike without training wheels in one afternoon and how my dad ran alongside me without holding the seat anymore and I didn't know until I looked back and he was way behind me, standing still. I wrote it really fast once I started. Ms Rennie gave it a green dot which means good and said "vivid memory" in the margin.`,

`Art class on Wednesday was supposed to be portraits but mine kept looking like a potato with ears no matter what I did. I rubbed out the nose four times and the paper started going thin. Josh next to me was doing a really good one of his grandad with proper shadows and everything and I asked how he did the shading and he showed me this trick with the pencil on its side. Mine got slightly better after that but still not great. Ms Tran said "I like the character in this one" which I think was a kind way of saying it was weird. I actually don't mind. Some of the best ones in there looked kind of strange anyway.`,

`Sports day was canceled twice because of rain and when it finally happened everything was muddy at the edges of the oval. The Year 5 relay was near the end and by then I was already tired from the long jump and the beanbag throw. Our team was me, Chloe, Devon and Nic. Devon dropped the baton on the second exchange and we lost by a lot. He felt really bad and went quiet. On the way to pack up I said the baton was slippery from the mud which was partly true. He said thanks for saying that. I think we both knew it wasn't just the mud but it seemed like the right thing to say at the time.`,

`My friend Tomas dared me to eat a whole chilli at the school garden stall during lunchtime. The teacher running it said it was mild but it was not mild. I ate it anyway because Tomas was watching and also three other kids I didn't know that well. My mouth was burning for the rest of lunch and through the start of English. I drank two whole water bottles and kept having to ask to go to the bubbler. Mrs Clarkson asked if I was alright and I said yes, just thirsty. The burning faded around 2pm. Tomas said I was brave which I knew was also him admitting he wouldn't have done it. I felt fine about the whole thing, actually.`,

`It was assembly and our class had to present the values award. I was supposed to hold up the certificate while Finn read out the winner's name, but I grabbed the wrong envelope and the certificate inside was last month's. Finn read out the name and I held up the wrong one and the teacher at the side of the stage was doing this small urgent waving thing at me. I swapped it out as fast as I could but the whole school had already seen. Some kids laughed, not mean laughing, just surprised laughing. Afterwards Ms Nair said it was fine and these things happen. It took about a week before I stopped thinking about it whenever I walked past the hall.`,

`We did a science experiment with bicarb soda and vinegar and it was supposed to foam up in the bottle and push a cork off. Mine fizzed a lot but the cork just sort of slid to the side instead of popping. Everyone else's was the same except for Mia's which flew across the table and hit the whiteboard. Ms Garland said it was a great result but also said not to aim them at things. We had to write up what happened in our books and I put "the cork did not launch correctly" which Ms Garland changed to "the cork was displaced laterally" when she checked it. I wrote that down because it sounds much better.`,

`The end of term concert was the night I had been nervous about for six weeks. I was in the recorder ensemble and we were playing two songs. Recorders sound terrible when you're learning them, everyone knows this, but we'd actually gotten pretty decent. During the actual performance though someone two rows back was playing the wrong note in the second song and I could hear it the whole time. I don't know if the audience heard. My parents said it sounded great. The video Mum took is shaky because she was also trying to hold an umbrella and her phone at the same time because they'd set the chairs up outside and it rained.`,

`We were supposed to be working quietly on our reading comprehension but the kid next to me, Ryan, kept tapping his pencil without realising. I asked him to stop twice and he did for about ten seconds each time. I told Ms Farrant and she said use my strategies, which meant try to ignore it. I could not ignore it. By the end of the lesson I had answered maybe half the questions and the rest I just wrote something down so the page wasn't blank. When she marked them she put a question mark next to one of my answers which was obviously wrong and I understood why but I still felt annoyed. I told Mum at dinner and she said some people just do that and they don't even know they're doing it. That was somehow both unhelpful and also exactly right.`,

`The best thing that happened all term was finding a twenty dollar note folded up near the bin outside the canteen. I stood there for a minute looking around to see if anyone was looking for it. Nobody was. I took it to the front office and the lady said if nobody claimed it in a week it was mine. I thought about it every day that week. On Friday she called my name at roll call and said to come collect it after school. I bought a new pack of Microns with it, the fine-liner pens I'd wanted since the start of the year. I used the leftover $4.20 on a Zooper Dooper. It felt like the best money I'd ever spent even though technically it wasn't mine to begin with.`
    ],
    Senior: [
`She got the message at 11:47pm and read it three times because the first two times she didn't believe it. Jamie had told everyone. Not just the people she'd told him about, everyone. She put her phone face down on the mattress and stared at the ceiling. The fan was making its clicking sound, the same one it made every rotation, and she counted clicks. Forty-seven. Forty-eight. She picked the phone back up and looked at Instagram even though she knew she shouldn't. Forty-two likes on a post she hadn't written, a photo she hadn't taken, and a caption that used her name. She thought about texting him. She opened the chat, typed something, deleted it. Typed something else. Deleted that too. Outside a car went past with music on. She turned her lamp off and lay in the dark and tried to decide whether she was more angry or more embarrassed, and couldn't separate the two.`,

`The night before the ATAR results dropped, Marcus cleaned his room. He didn't plan to, he just found himself pulling things from the shelf and wiping them down and putting them back. His mum had gone to bed early because she had an early shift and he was grateful for that, for the house being quiet. He'd told everyone he'd gotten into medicine. He'd said it casually at his cousin's birthday like it was something he already knew. He sat at his desk at 12:02am and his hand was literally shaking when he moved the mouse. The number came up and he sat with it for a while. Not high enough. He'd need to do something else, or wait, or try again. He closed the laptop and sat in the dark for a while. Then he went and stood in the backyard in the cold and looked at the neighbour's lemon tree over the fence. He'd tell his mum in the morning. He'd figure it out. He just needed tonight.`,

`The team lost the grand final by two points. Afterwards in the change rooms nobody said much. Lachie sat with his boots still on and his hands hanging between his knees. The coach came in and said all the right things, about how proud he was, about the season they'd had. Lachie listened to him and nodded in the right places and felt nothing. Or not nothing. Something that was the opposite of nothing. Too full. His phone was full of messages he hadn't opened. On the bus home he sat next to Dex and they didn't talk, just watched the lights going past the window. When his stop came Dex said, "we were good though." Lachie said, "yeah." He walked the five minutes home and went straight to the shower and stood in it for a long time with the water too hot. The season was over. He'd think about what that meant later.`,

`Priya had applied for the leadership role because everyone kept saying she should. Or maybe that wasn't true. She'd wanted it, she thought. She sat across from the panel and answered their questions cleanly. She knew what they wanted to hear and she said it. She believed most of it. Walking back to class she felt the strange flatness that comes after something you've prepared for. She got the role. Her name on the noticeboard on Thursday, her photo taken, her parents told. And then it started, the meetings that went until 5:30, the emails, the decisions that everyone had an opinion about. By term three she was tired in a way that sleep didn't fix. She was good at it, that was clear, everyone said so. She just didn't know anymore if she'd chosen it or been shaped into choosing it, and she wasn't sure which of those would be worse to admit.`,

`The conversation with his dad about the future started the same way it always did. His dad got out the folder he kept on the kitchen bench, the one with the course guides and the highlighted pages. Daniel sat down and waited. His dad wasn't a bad person. He worked hard and he worried and he showed that by printing things out and colour-coding them. Daniel had an ATAR target and a backup plan and a backup to the backup. He had a spreadsheet of entry scores. What he didn't have was the feeling that any of it was actually for him. He looked at the folder and tried to find the right words. He said he'd been thinking. His dad said, good. He said he wanted to defer for a year and his dad put the folder down and looked at him for a long moment. Outside someone was mowing their lawn. The sound filled the silence.`,

`The first time she skipped a class it was just the one and she sat in the library and felt guilty enough that she didn't do it again for three weeks. The second time she went to the café across the road and sat with a coffee she couldn't quite finish and read her book and tried to remember what the point of skipping had been. It started to happen more regularly, just occasionally, then every Thursday, then sometimes twice a week. She was still passing everything. She told herself that was the point. The work was being done, so what did it matter. But she knew that wasn't really what she was doing. She was practicing disappearing in small ways. Testing whether anyone would notice. Sometimes they did. Usually they didn't. She hadn't worked out what that told her yet.`,

`After the funeral everyone came back to Nan's house and there was food on every surface. Relatives he hadn't seen in years stood around saying things about his grandfather that were true but also small, like they were all describing a different person. Tom sat on the back steps with his cousin Nell and they didn't talk about his grandfather at all, which was the right decision. Nell was in her last year of her psychology degree and she said she'd been reading about grief and how people go through it differently and Tom said he didn't think he'd started yet. She said sometimes that's how it goes. There was a moth on the door frame making a sound against the screen and he watched it for a while. Inside someone laughed loudly at something. He thought about how strange it was that you could be in a house full of people who loved each other and still feel like there was no one to talk to.`,

`The protest was Yasmin's idea and within a week it had become something else. Other people joined, organised, posted, and by Thursday there were signs she hadn't designed with slogans she hadn't written. That wasn't bad, she kept telling herself. The cause was the same. But standing at the front on Friday morning she felt weirdly separate from it, like she was watching something she'd planted grow in a direction she hadn't expected. A reporter from the local paper asked her questions and she answered them carefully. That night online someone she didn't know with a blue tick posted about the protest and tagged her. By morning she had four hundred new followers. She sat with her phone in her lap and thought about how something you start because you believe in it can become something much bigger than belief very quickly, and how that's not entirely good or bad but it's definitely different.`,

`The relationship ended in the school car park, which was stupid. Maya had always thought breakups happened somewhere meaningful or at least private. She sat on the passenger seat with the door open and her feet on the ground and he sat on the bonnet. He said everything carefully like he'd prepared it. Maybe he had. She couldn't tell if that was worse than if he hadn't. He wasn't angry and neither was she and there wasn't anyone to blame, which turned out to be the hardest part. She drove home and came in and her mum was cooking and asked how her day was and she said fine and went upstairs and lay on her bed with her shoes still on. She stared at her physics notes on the desk. She wasn't sad, exactly. She was just aware of the absence of something she'd gotten used to, like when a noise you stopped noticing suddenly stops.`,

`In the time between handing his assignment in and the results coming back, Jake managed to forget he'd written it. He'd gotten into that state two weeks before the deadline where you just do the work, whatever it takes, and the words come because you can't afford them not to. He hadn't slept properly in four days. He ate at his desk. He submitted at 11:58pm and then played video games for three hours and slept twelve hours and woke up feeling like a different person in a good way. When Ms Varma handed it back with a Post-it note that said "see me," he felt sick for the whole of the next period. It turned out she wanted him to consider submitting it for a competition. He sat in her classroom after school and she said it was the most honest writing she'd read from a student in a long time. He didn't know what to do with that. He said thank you and walked to the bus stop and sat with it for the whole ride home.`,

`The night she decided to tell her mum she rehearsed it in the shower. Full sentences. Transitions. She even practised the pause after she said the thing, so she'd have something to do with herself while she waited. She came downstairs and her mum was watching something on her laptop with headphones in and she sat down on the couch next to her. Her mum pulled one headphone out. Sophie said she needed to talk to her. Her mum closed the laptop. Sophie said the thing. Her mum didn't say anything for a moment and then she said, I know. Sophie said, what? Her mum said she'd known for about a year, she'd just been waiting for Sophie to bring it up. Sophie didn't know whether to be relieved or annoyed that her whole prepared speech was now unnecessary. She was both. They sat on the couch for a while. Her mum made tea. It was not a dramatic evening, which was, in its own way, exactly what Sophie had needed.`,

`The mentor session with Mr Adebayo was supposed to be fifteen minutes and turned into an hour. He had this way of asking questions that made you keep talking when you thought you were done. Finn had gone in to talk about his uni application and come out having described his whole family, his relationship with his sister, what he'd felt like on exchange in Singapore, and a memory from primary school involving a cricket match he'd been thinking about for years without knowing why. He walked out to the corridor feeling slightly exposed, like he'd said more than he meant to. But also lighter. He walked to the canteen and bought a pie and stood in the sun and thought about the cricket match again. He'd been scared to field. He'd done it anyway. He hadn't thought about it as courage at the time. He thought about it now.`,

`The night they snuck onto the school oval with the speaker and the two six-packs they'd gotten Bec's brother to buy was the night everything felt exactly right in a way that Jade knew, even while it was happening, wouldn't last. There were six of them and they lay on the grass and looked at the sky over the suburb, orange at the edges where the city pushed up into the dark. Someone played a song and someone else knew all the words and they ended up all singing parts of it, badly, not caring. Jade was lying next to Chloe and Chloe said, "we should do this every year." Jade said, "we will," because it seemed like the thing to say. She knew, probably, that they wouldn't. Life would move and people would scatter. But there was something about saying it that made it feel true for the length of the night, and she decided that was enough.`,

`The interview for the selective school scholarship was in a room with a water carafe on the table, which Remy kept almost reaching for and stopping himself. There were three interviewers. They were kind in a professional way. They asked him about what he'd read, what he thought about, what he believed education was for. He had answers to most of it. One woman asked him what he'd failed at in the past year and he said he'd started a physics project he didn't finish and she asked why and he said honestly because he got interested in something else and followed that instead. She wrote something down. He didn't know if it was a good answer or not. On the train home his mum asked how it went and he said he didn't know. She said, if you were honest, that's the best you can do. He leaned against the window and watched the suburbs go past and thought about the project he hadn't finished and the one he had.`,

`She started teaching herself guitar at the start of year ten and within a month her fingertips were sore in a way that was somehow satisfying. She'd practice after dinner in her room, the same four chords over and over until they sat in her hands without thinking. Her brother complained through the wall. She kept going. By term three she could play seven songs all the way through, not perfectly, but completely. She played at the school open mic night because her music teacher said she should and she sat on the stool in the drama space with the lights on her and played a song she liked and the room was quiet in the way that means people are listening. Afterwards someone she barely knew came up and said she made it look easy. She thought about saying, it isn't, it's actually months of sore fingers and annoying your brother. She said, thank you.`,

`The volunteer shift at the food bank was compulsory for the Service Learning program but Marcus kept going back after the requirement was done. He didn't have a grand reason. It was something to do on Saturday mornings when he'd otherwise scroll his phone until midday. He got good at sorting donations, at knowing which cans to front, which bread was still in date. He got to know the other regular volunteers, mostly older people who'd been coming for years. He wasn't comfortable with the feeling that he was supposed to be doing this because it was good, because the truth was he was doing it partly because he liked the routine and partly because he liked the people. He mentioned this to his ethics teacher once and she said, does it matter? He thought about it for a while. He decided it didn't, mostly.`,

`The gap between who she was at school and who she was at home had been getting wider for about two years. At school she was together, organised, funny in the dry way that teachers found acceptable. At home she stayed in her room a lot and often didn't feel like talking. Her parents noticed but didn't push it which she was grateful for most of the time and frustrated by occasionally. She hadn't found a way to say, I am fine and also very tired. She hadn't found a way to say, I like my life and also sometimes it feels like something I'm performing. She hadn't found language for it yet. She wrote in her journal sometimes and read it back and thought, that's closer. She filled a lot of pages looking for the sentence that said exactly what she meant and didn't find it, but she kept looking.`,

`The community art project used the side wall of the library and fifteen students and six buckets of acrylic paint in a thirty-degree heatwave. It was supposed to represent the suburb's history. It turned into something else. People painted what they knew, their families, their food, a particular street corner, a cricket oval, a bus route. Mr Chu from art stood back most of the time and let them work, which was the right call. By the end of day two the wall was dense and busy and probably not what the council had imagined when they approved it. It was better than what the council had imagined. Ellie stood back and looked at it on the last afternoon and felt the uncomplicated pride of having made something real, something outside of marks and rubrics, something that would be there tomorrow.`,

`He got his learner's and his mum took him to the car park of the old K-Mart every Sunday morning for six weeks. He was terrible at the start. He stalled at every give way. He couldn't judge the turning circle. His mum was patient in a focused way that he imagined took effort. By week four something clicked and he drove them home properly, through actual streets with actual traffic, and she only said something twice. When he passed his test she shook his hand formally and then laughed at herself and hugged him. He drove to school the next Monday, alone, and sat in the car park for five minutes before he went in because he wanted to hold the feeling a bit longer. It was a small thing. It felt, in that moment, like evidence of something.`,

`The night before she left for the exchange program her mum knocked on her door and came in and sat on the bed and said she was proud of her. Ava had been mostly okay up until that point. She'd packed efficiently. She'd said her goodbyes. She'd been practical about it in a way that felt like control. But her mum sitting on the bed and saying I'm proud of you in that particular voice was too much and she cried for about ten minutes, ugly crying, into her mum's shoulder like she was eight. Her mum didn't say anything while it was happening, just held her and rubbed her back. When it stopped Ava said she was embarrassed and her mum said, you're going to do something hard. There's nothing embarrassing about that. Ava washed her face and finished packing. The next morning she was fine.`

    Junior: [
`In the book Wonder by R.J. Palacio, the author shows that kindness is more important than fitting in. The main character Auggie has a facial difference and starts at a new school where most kids don't know how to act around him. One of the most important parts is when Jack Will chooses to be Auggie's friend even when other kids are being mean. This is a big deal because it shows that doing the right thing is hard sometimes, especially when you might lose your own friends because of it. Palacio uses this friendship to show that being kind takes courage. Auggie also shows courage by going to school every day even though it is really difficult. The message of the book is that everyone deserves to be treated with respect no matter how they look. This is an important message because in real schools people are left out for all kinds of reasons. The book shows that one person being kind can actually change the whole atmosphere of a place.`,

`The film Matilda, based on the Roald Dahl novel, uses exaggeration to show the difference between adults who help children and adults who try to control them. Miss Honey is patient and believes in Matilda from the beginning. Miss Trunchbull is the opposite and uses fear and punishment to control the whole school. The director makes Trunchbull much bigger and louder than everyone else, which is a way of showing how power can feel overwhelming to a child. Matilda uses her mind to fight back, which tells the audience that intelligence is a form of strength. The film is funny in parts but also has some genuinely scary moments, which makes sense because being a child around adults who don't listen to you can feel scary. Roald Dahl often wrote about adults who are cruel and children who are smarter than they're given credit for. Matilda fits this pattern perfectly and the ending, where she gets to stay with Miss Honey, feels earned because of everything she goes through to get there.`,

`In the novel Holes by Louis Sachar, the main character Stanley is sent to Camp Green Lake for something he didn't even do. He has to dig holes every day in the hot sun, which the warden says builds character but is actually just used to find hidden treasure. Sachar uses the holes as a symbol. The boys are forced to dig into the earth but they're also being dug into, like their identities are slowly being worn down. Stanley's friendship with Zero is one of the most important parts of the story because it's the one real thing in a place that is mostly unfair and fake. The way Sachar mixes the past and the present storylines is clever because it shows that what happened to Stanley's family generations ago is still affecting him now. The book is about how bad luck and unfair systems can follow a person, but also about how loyalty can break those patterns. The ending is satisfying because justice happens in a way that feels believable and not too easy.`,

`The film Zootopia shows that prejudice is something even well-meaning people can be guilty of. Judy Hopps wants to be a police officer in a city where predators and prey are supposed to live equally, but she still makes assumptions about Nick the fox just because of what he is. The film makes Judy the hero but also shows she is wrong sometimes, which is a more honest kind of storytelling. The metaphor the film uses about natural instincts versus choice is interesting because it asks whether animals, or people, can change. Nick's backstory, where he talks about being humiliated as a kid trying to join a scout troop, is one of the saddest moments in the film and it explains why he acts the way he does as an adult. Disney animations often try to say something about the real world through animal characters and Zootopia does this more directly than most. The main message is that stereotypes hurt everyone, including the people who benefit from them, and that changing a system starts with changing your own thinking.`,

`Charlotte's Web by E.B. White is a story about friendship and about accepting that things end. Wilbur the pig and Charlotte the spider are very different but they care about each other in a way that feels genuine. Charlotte uses words to save Wilbur's life, which is interesting because words are also what the author uses to tell the whole story. White is saying that language matters and that the right words at the right time can actually change what happens. The saddest part of the book is when Charlotte dies alone at the fairground while Wilbur is taken home. White doesn't soften this or skip over it, which shows respect for the reader even though the book is for younger children. Wilbur naming Charlotte's children is a way of showing that friendship continues even after loss. The book teaches that loyalty and gratitude are worth something even when they can't stop bad things from happening. It's an old book but the ideas in it are still true.`,

`The Giver by Lois Lowry imagines a future where everything is decided by a committee and people don't have real choices or real feelings. Jonas is chosen to be the Receiver of Memory, which means he's the only person who gets to learn what the world was actually like before. The contrast between the grey sameness of the community and the vivid memories Jonas receives is one of the most powerful things about the book. Lowry uses colour as a symbol of feeling and freedom. As Jonas starts to see colour, he also starts to understand what is being taken from everyone else. The moment he finds out what release really means is the turning point of the story and it's genuinely shocking, which the author sets up carefully so it doesn't feel cheap. The ending is left open, which some readers find frustrating, but it makes sense because the book is about uncertainty and hope rather than guaranteed happy endings. The question Lowry is asking is whether safety is worth giving up everything else.`,

`In the novel The Outsiders by S.E. Hinton, the conflict between the Greasers and the Socs is used to explore how class shapes identity. Ponyboy is a Greaser but he reads and thinks in ways that don't fit the tough image his group is supposed to have. This tension is central to the book. Hinton wrote the novel as a teenager herself, which explains why the feelings feel so accurate. The relationships between the boys in Ponyboy's group are shown with genuine warmth, especially between Ponyboy and Johnny. Johnny's death is one of the most affecting moments in the novel because Hinton has taken so much time to show who he is before it happens. The line "stay gold" from the Robert Frost poem is used throughout the book to mean something about preserving innocence before the world gets complicated. The book argues that the labels people put on you, whether Greaser or Soc, say less about who you actually are than the choices you make and the people you choose to love.`,

`The film Spirited Away by Hayao Miyazaki follows a girl named Chihiro who enters a spirit world and has to work in a bathhouse to earn her way back to her parents. On the surface it's a fantasy adventure but it is also about growing up, about what it means to work hard and to hold onto who you are when everything around you is strange and difficult. The bathhouse is run by Yubaba who steals names because without your name you forget yourself. This is a metaphor about identity. Chihiro remembers Haku's real name and this saves him, which continues the theme that knowing and using someone's real name is a form of deep care. Miyazaki uses the spirit world to show aspects of Japanese culture and tradition but the emotional core of the film is universal. Chihiro is not a typical hero because she doesn't have special powers, she just keeps going even when she's scared. The film is saying that persistence and empathy are more useful than strength.`,

`In Roald Dahl's Charlie and the Chocolate Factory, the five children who win golden tickets represent different kinds of bad behaviour and Charlie represents something else entirely. Dahl uses the elimination of each child to make a point about a specific flaw, greed, selfishness, aggression, laziness. Charlie wins not because he is extraordinary but because he is decent, which is actually an unusual thing for a children's story to say. Most stories reward the special child who has hidden talents. This story rewards the ordinary, kind child. The chocolate factory itself is strange and dreamlike and a bit threatening, which reflects Wonka as a character. He is generous but also watching and judging the whole time. Dahl wrote the book partly as a critique of consumerism and the way children are marketed to, which is still very relevant. The illustrations by Quentin Blake add to the slightly unsettling tone because the characters are exaggerated in a way that makes them feel like cartoons of real people.`,

`The novel Bridge to Terabithia by Katherine Paterson deals with grief in a way that is unusual for a children's book because it does not protect the reader from it. Jess and Leslie create an imaginary kingdom together and their friendship is shown as the most important thing in both their lives. When Leslie dies suddenly, the author does not give Jess time to adjust or prepare, which mirrors how sudden loss actually feels. The imaginary world of Terabithia is important because it represents what they built together and what Jess has to decide what to do with after Leslie is gone. The ending, where Jess builds a bridge so his little sister can enter Terabithia, is about passing something on and about continuing to live and imagine even after loss. Paterson has said the book was based on a real death she experienced, which explains the honesty of it. The friendship between Jess and Leslie is also notable because it crosses gender lines in a way that the book treats as completely normal, which is quietly important.`,

`In the film Finding Nemo, Marlin's overprotectiveness comes from fear, which is understandable because he has already experienced real loss. The film shows that fear can limit the people you love as much as it limits yourself. Dory is the opposite of Marlin because she lives entirely in the present, partly because of her memory condition, and this makes her both comic and wise. The way the film uses the ocean as a setting is important because the ocean is genuinely dangerous but also vast and full of life. Marlin's journey is about learning that he cannot control everything and that letting Nemo take risks is part of loving him. Nemo's journey is about proving that he is capable despite his small fin. Both journeys mirror each other. The film is made by Pixar who are very good at putting genuinely sad or difficult content inside a family story and Finding Nemo is one of their best examples of this because the opening scene is one of the most affecting in any animated film.`,

`The Hobbit by J.R.R. Tolkien follows Bilbo Baggins who is a hobbit who values comfort and routine above everything. He is chosen for an adventure he doesn't want and the novel is about what happens when someone like that is pushed beyond their limits. Tolkien uses Bilbo's growth carefully because Bilbo doesn't become a warrior, he becomes someone who is brave in particular moments when it matters. The scene with Gollum where they trade riddles is one of the most famous in the novel and it works because both characters are intelligent and the stakes feel real. Bilbo's choice not to kill Gollum when he has the chance is significant and Tolkien says later that it was the most important thing Bilbo ever did. The ring is introduced quietly which is interesting given what it becomes in The Lord of the Rings. The tone of The Hobbit is warmer and lighter than those later books but the ideas about courage and mercy are just as serious.`,

`The novel The Boy in the Striped Pyjamas by John Boyne is told from the perspective of Bruno, a nine-year-old German boy whose father is a Nazi commandant. Boyne uses Bruno's innocence and ignorance as a narrative device to show the horror of the Holocaust through the eyes of someone who doesn't understand it. Bruno's friendship with Shmuel, who is on the other side of the fence at a concentration camp, is both the emotional centre of the story and its central metaphor. The fence is a physical representation of the separation created by ideology and power, but Bruno doesn't understand what the fence means. This is what makes the novel so disturbing. The ending is devastating and Boyne doesn't soften it. Some critics have argued about whether it is appropriate to tell this history from a German child's perspective, and whether Bruno's innocence is believable. These are worth thinking about. What the novel does successfully is show that systems of hatred affect everyone, including children who are born into them without choosing.`,

`In the film The Lion King, the story draws on Shakespeare's Hamlet to tell a story about guilt, responsibility and growing up. Simba's belief that he caused his father's death is the central wound of the film and Scar uses that belief to control him. The film uses the visual language of light and dark very deliberately, with the Pride Lands becoming grey and dead under Scar's rule and returning to colour when Simba comes back. The scene where Simba sees his father's reflection in the water is one of the most visually striking in any Disney film and it works because it connects the themes of memory and identity directly to an image. Mufasa's voice saying "remember who you are" is essentially the message of the whole film. Simba's arc is about accepting that running from pain doesn't make it go away and that becoming who you're meant to be sometimes means walking back into the place that hurt you most. The film is emotionally honest for a children's animation, particularly in how it handles Mufasa's death without any softening.`,

`The novel Storm Boy by Colin Thiele is a short book but it carries a lot of emotional weight. It is set on the Coorong in South Australia and the landscape is central to the story in a way that goes beyond setting. Thiele uses the coast as a reflection of the boy's inner life, isolated, beautiful, a bit wild. The relationship between Storm Boy and Mr Percival the pelican is the heart of the book and it works because Thiele shows it developing slowly through specific details rather than telling the reader how the boy feels. When Mr Percival dies saving the hunters, the tragedy feels earned because of everything that has been built before it. Hideaway Tom's relationship with Storm Boy is also important because it shows a different kind of quiet care. The book is ultimately about what happens when a deeply isolated child forms an intense bond and then loses it. Thiele does not make the ending comfortable and that honesty is part of why the book has lasted. The environmental message about the Coorong and its wildlife is woven into the story naturally rather than being stated.`,

`In Harry Potter and the Philosopher's Stone, J.K. Rowling introduces a world that feels both completely different from the real world and deeply familiar. The division between the wizarding world and the muggle world maps onto ideas about belonging and exclusion that children experience in ordinary life. Harry's transition from being an outsider at the Dursleys to being celebrated at Hogwarts is satisfying but Rowling complicates it by making Harry uncomfortable with the attention. He doesn't want fame, he wants a family and a place to belong. Rowling uses the mirror of Erised in a pivotal scene where Harry sees himself surrounded by family. The mirror shows you what you most desire and the fact that Harry sees his family rather than wealth or power tells the reader who he really is. The friendship between Harry, Ron and Hermione is built gradually through shared experience including danger. The book is structured carefully with a mystery at the centre that rewards re-reading because the clues are planted early and honestly.`,

`The film Bluey, or more accurately the television series Bluey, is an Australian animated show that appears to be for young children but regularly deals with adult emotions in ways that feel genuine. The character of Bandit, the father, is shown as someone who is trying his best but also tired and imperfect. Episodes like Sleepytime and The Show use animation and music to explore emotional depth that goes beyond typical children's television. Sleepytime in particular is remarkable because it animates Bingo's dream as a space journey while quietly showing Bandit and Chilli watching over her, which creates an image of parental love without any dialogue. The show's achievement is that it represents play as genuinely important rather than just something children do before real life begins. It treats the domestic and the ordinary as worthy of attention, which is also what good literature does. The show has a strong sense of place and the Brisbane setting gives it a distinctiveness that sets it apart from other family animations which tend to be set in vague American suburbia.`,

`In the novel Matilda by Roald Dahl, the title character is a child with extraordinary intelligence living in a family that doesn't value intelligence at all. Dahl uses this contrast deliberately because it makes Matilda's situation both funny and genuinely painful. Her parents watch television all evening and don't notice that she can read complex novels by the age of four. Miss Honey is the character who sees her properly, which is part of why their relationship is so important. The power Matilda develops, moving objects with her mind, can be read as a metaphor for the power of a focused and active intellect in an environment that tries to suppress it. Trunchbull represents institutional cruelty, the kind that has authority behind it and is therefore harder to fight than ordinary meanness. Matilda defeats her through cleverness rather than strength. The book argues consistently that children are capable of more than adults give them credit for and that environments which underestimate children do real damage. The ending gives Matilda what she has always needed, a home where she is seen and valued.`,

`The film Inside Out by Pixar takes the abstract concept of emotions and turns it into characters, which is a clever device because it makes the invisible visible. Joy, Sadness, Fear, Disgust and Anger all live inside Riley's head and the film shows that emotions work together rather than separately. The most important idea in the film is that Sadness is not a problem to be fixed. For most of the film Joy tries to keep Sadness away from the control panel because she believes happiness is the goal. The film argues that this is wrong. Sadness allows Riley to accept help and connect with her parents. The memory spheres turning from happy gold to sad blue, and being more valuable that way, is the film's central image. The character of Bing Bong, Riley's imaginary friend, is used to show what has to be let go for a child to grow up, which is handled with real sensitivity. Pixar films are often praised for being meaningful to adults but Inside Out is unusual because it is genuinely useful. It explains emotional complexity in a way that children can understand and use.`,

`The novel The Secret Garden by Frances Hodgson Burnett uses the image of a locked garden to explore what happens when grief is allowed to take over a life. Mary Lennox arrives at Misselthwaite Manor as a difficult, selfish child and gradually becomes something else as she discovers and restores the garden. The garden works as a metaphor for the part of Colin's life that has been closed off by his father's grief and his own fear. Burnett's point is that living things, whether plants or people, need care and light and open air to grow. Dickon, the boy from the village who understands animals and plants, represents a different relationship with the natural world, one that is instinctive rather than fearful. The transformation of both Mary and Colin is tied directly to the transformation of the garden, and Burnett makes this connection clear without overstating it. The novel was written in 1911 and some of the language reflects the attitudes of that time, which is worth being aware of when reading it. What remains genuinely moving is the idea that healing is possible and that it often begins with something small and growing.`
